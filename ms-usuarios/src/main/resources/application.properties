spring.application.name=ms-usuarios
server.port=8082

spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:msusuarios.db?date_string_format=yyyy-MM-dd&date_class=text
spring.datasource.username=
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Configuración de Flyway para migraciones
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=booksyspa-muy-secreto-key-jwt-authentication-2024-very-long-key-12345
jwt.expiration=86400000
